<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Science Community Nijmegen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --blue: #002060;
    --accent: #BE311A;
    --bg-hero: #f3f5f8;
    --text: #1f1f1f;
}

/* BASE */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Inter", sans-serif;
    color: var(--text);
    padding-top: 70px;
}

/* NAVBAR */
.topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 0 40px;
    background: var(--bg-hero);
    z-index: 1000;
}

/* LOGO */
.logo img {
    height: 42px;
}

/* DESKTOP NAV */
nav {
    display: flex;
    gap: 18px;
    justify-content: flex-end;
    align-items: center;
}

nav a {
    text-decoration: none;
    color: var(--blue);
    font-weight: 500;
    font-size: 0.95rem;
}

/* HOME ICON (OUTLINE SVG) */
nav a.home {
    display: flex;
    align-items: center;
}

nav a.home svg {
    width: 22px;
    height: 22px;
    stroke: var(--blue);
    fill: none;
    stroke-width: 2;
}

/* SCROLLED NAV */
.topbar.scrolled {
    background: white;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

/* HERO */
.hero {
    min-height: calc(100vh - 70px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 8vw;
    background: var(--bg-hero);
    position: relative;
}

.hero-content {
    position: relative;
    max-width: 900px;
}

/* SCROLL ARROW */
.scroll-down {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
}

.scroll-down span {
    display: block;
    width: 22px;
    height: 22px;
    border-right: 3px solid var(--blue);
    border-bottom: 3px solid var(--blue);
    transform: rotate(45deg);
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%, 100% { transform: rotate(45deg) translateY(0); }
    50% { transform: rotate(45deg) translateY(8px); }
}

/* TEAM */
.team {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 25px;
    max-width: 1100px;
    margin: auto;
    text-align: center;
}

.member img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
}

/* MOBILE */
.hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
}

.hamburger span {
    width: 25px;
    height: 2px;
    background: var(--blue);
}

/* MOBILE MENU */
.mobile-menu {
    position: fixed;
    inset: 0;
    background: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 25px;
    transform: translateX(100%);
    transition: 0.3s ease;
}

.mobile-menu.open {
    transform: translateX(0);
}

.mobile-menu a {
    font-size: 1.4rem;
    text-decoration: none;
    color: var(--blue);
}

/* RESPONSIVE */
@media (max-width: 900px) {
    nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }
}
</style>
</head>

<body>

<header class="topbar">

    <a class="logo" href="#">
        <img src="OSCN logo transparant.png" alt="OSCN Logo">
    </a>

    <nav>
        <a class="home" href="#">
            <!-- OUTLINE HOME ICON -->
            <svg viewBox="0 0 24 24">
                <path d="M3 10.5L12 3l9 7.5"></path>
                <path d="M5 10v10h14V10"></path>
            </svg>
        </a>

        <a href="#">About</a>
        <a href="#">Events</a>
        <a href="#">News</a>
        <a href="#">Resources</a>
        <a href="#">Members</a>
        <a href="#">Contact</a>
        <a href="#">Newsletter</a>
    </nav>

    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>

</header>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Events</a>
    <a href="#">News</a>
    <a href="#">Resources</a>
    <a href="#">Members</a>
    <a href="#">Contact</a>
    <a href="#">Newsletter</a>
</div>

<section class="hero">
    <div class="hero-content">
        <h1>Open Science Community Nijmegen</h1>
        <p>Making research more transparent and collaborative.</p>
    </div>

    <div class="scroll-down">
        <span></span>
    </div>
</section>

<script>
const hamburger = document.getElementById("hamburger");
const mobileMenu = document.getElementById("mobileMenu");

hamburger.addEventListener("click", () => {
    mobileMenu.classList.toggle("open");
});

window.addEventListener("scroll", () => {
    document.querySelector(".topbar").classList.toggle(
        "scrolled",
        window.scrollY > 50
    );
});
</script>

</body>
</html>
