<section class="flash soft news-section">

    <div class="section-header">
    <div class="section-kicker">OSCN UPDATES</div>
    <h2 class="section-title">News</h2>
</div>

    <div class="news-grid" id="all-news"></div>

    <script>
function renderAllNews() {
    const container = document.getElementById("all-news");

    const sorted = [...articles]
        .sort((a, b) => new Date(b.date) - new Date(a.date));

    container.innerHTML = sorted.map(a => `
        <article class="news-card">
            <img src="${a.image}" alt="${a.title}">
            <div class="news-content">
                <div class="news-date">${a.date}</div>
                <h3>${a.title}</h3>
                <p>${a.excerpt}</p>
                <a href="${a.link}?id=${a.id}">Continue reading →</a>
            </div>
        </article>
    `).join("");
}

renderAllNews();
</script>
        </article>

    </div>

</section>
